---
name: Agent Memory Ledger
version: 0.1.0
slug: agent_memory_ledger
description: "PostgreSQL, TimescaleDB, and RuVector infrastructure for
  governed autonomous event history and qualified agent memory"
url: https://github.com/GodSpeedAI/hassos-addon-agent-memory-ledger
arch:
  - aarch64
  - amd64
startup: system
init: false
tmpfs: true
map:
  - share:rw
  - backup:rw
  - media:rw
timeout: 60
backup_pre: /usr/share/agent_memory_ledger/backup_pre.sh
backup_post: /usr/share/agent_memory_ledger/backup_post.sh
backup_exclude:
  - data/postgres/**
  - postgres/**
  - data/oxigraph/**
ports:
  5432/tcp:
  7878/tcp:
ports_description:
  5432/tcp: "PostgreSQL Port. Beware! This port may already be in use.
    Choose another port-number if the add-on won't start."
  7878/tcp: "Oxigraph SPARQL endpoint (only active when oxigraph.enabled=true).
    Default: internal only (127.0.0.1). Set bind to 0.0.0.0 to expose."
options:
  databases:
    - homeassistant
  timescale_enabled:
    - homeassistant
  timescaledb:
    telemetry: basic
    maxmemory: 512MB
    maxcpus: 4
  max_connections: 50
  system_packages: []
  init_commands: []
  retry_upgrade: false
  agent_memory:
    enabled: false
  oxigraph:
    enabled: false
    data_dir: /data/oxigraph
    bind: 127.0.0.1
    port: 7878
    expose_port: false
    log_level: info
    project_governance: true
    project_identity_lineage: true
    project_memory: true
    project_raw_events: false
    rebuild_on_start: false
    batch_size: 500
    max_projection_interval_seconds: 60
  postgresql_config: {}
  pg_hba_config: []
schema:
  databases:
    - str
  timescale_enabled:
    - str
  timescaledb:
    telemetry: list(off|basic)
    maxmemory: str?
    maxcpus: int(1,)?
  max_connections: int(20,)
  system_packages:
    - str
  init_commands:
    - str
  retry_upgrade: bool?
  agent_memory:
    enabled: bool
    database: str?
    create_default_schema: bool?
    enable_ruvector: bool?
    enable_timescaledb: bool?
    retention_days: int(1,)?
    embedding_dimension: int(1,4096)?
    include_embeddings_in_backup: bool?
  oxigraph:
    enabled: bool
    data_dir: str?
    bind: str?
    port: port?
    expose_port: bool?
    log_level: list(info|debug|warn|error)?
    project_governance: bool?
    project_identity_lineage: bool?
    project_memory: bool?
    project_raw_events: bool?
    rebuild_on_start: bool?
    batch_size: int(1,10000)?
    max_projection_interval_seconds: int(10,3600)?
  postgresql_config:
    match(^[a-z_]+$)?: str?
  pg_hba_config:
    - type: list(local|host|hostssl|hostnossl)?
      database: str?
      user: str?
      address: str?
      method: list(trust|reject|md5|password|scram-sha-256|gss|sspi|ident|peer|pam|ldap|radius|cert)?
      options: str?
image: ghcr.io/godspeedai/agent-memory-ledger/{arch}

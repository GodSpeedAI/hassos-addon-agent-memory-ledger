---
name-template: 'v$RESOLVED_VERSION 🌈'
tag-template: 'v$RESOLVED_VERSION'
categories:
  # Labels aligned with the pr-labels gate's valid set
  # (hassio-addons/workflows pr-labels.yaml): breaking-change, bugfix,
  # documentation, enhancement, refactor, performance, new-feature,
  # maintenance, ci, dependencies, translations.
  - title: '🚀 Features'
    labels:
      - 'new-feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bugfix'
      - 'breaking-change'
  - title: '🧰 Maintenance'
    labels:
      - 'maintenance'
      - 'refactor'
      - 'performance'
      - 'ci'
      - 'dependencies'
      - 'documentation'
      - 'translations'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'   # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch
template: |
  ## Changes

  $CHANGES

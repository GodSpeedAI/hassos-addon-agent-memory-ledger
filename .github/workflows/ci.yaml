---
name: CI

# yamllint disable-line rule:truthy
on:
  push:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  information:
    name: Gather app information
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.information.outputs.architectures }}
      build: ${{ steps.information.outputs.build }}
      description: ${{ steps.information.outputs.description }}
      name: ${{ steps.information.outputs.name }}
      slug: ${{ steps.information.outputs.slug }}
      target: ${{ steps.information.outputs.target }}
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run app information action
        id: information
        uses: frenck/action-addon-information@ce1377e9851cf569c29329e65fb2c57e67ca0f69

  lint-app:
    name: Lint App
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run App Lint
        # community: false — this is a standalone repo with its own deploy.yaml
        # and pre-built images, NOT part of the "HA Community Add-ons" shared
        # builder. Community mode enforces version=dev (substituted at build),
        # which is incompatible with a pre-built-image addon that must carry a
        # real committed version for Home Assistant to pull.
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb
        with:
          community: false
          path: "./${{ needs.information.outputs.target }}"

  lint-hadolint:
    name: Hadolint
    needs:
      - information
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Hadolint
        uses: brpaz/hadolint-action@c27bd9edc1e95eed30474db8f295ff5807ebca14
        with:
          dockerfile: "./${{ needs.information.outputs.target }}/Dockerfile"

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run JQ
        shell: bash
        run: |
          shopt -s globstar nullglob
          for file in **/*.json; do
            if ! jq '.' "$file" >/dev/null 2>&1; then
              echo "::error file=${file}::Invalid JSON in ${file}"
              jq '.' "$file"
              exit 1
            fi
          done

  lint-shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        env:
          SHELLCHECK_OPTS: -s bash

  lint-yamllint:
    name: YAMLLint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run YAMLLint
        uses: frenck/action-yamllint@34b4bbcaeabedcfefad6adea8c5bbc42af0e2d47

  lint-prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run Prettier
        uses: creyD/prettier_action@8c18391fdc98ed0d884c6345f03975edac71b8f0
        with:
          prettier_options: --check **/*.{json,js,md,yaml}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        continue-on-error: true
        # Requires GitHub Dependency Graph enabled in repo settings.
        # See: Settings > Code security > Dependency graph

  lint-dockerfile-deps:
    name: Dockerfile dependency hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Check for unapproved :latest, --allow-untrusted, and missing Python pins
        shell: bash
        run: bash scripts/check-dockerfile-deps.sh

  test-bridge:
    name: Bridge unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Lint bridge Python (ruff check)
        run: ruff check agent_memory_ledger/rootfs/usr/bin/sea_nats_bridge.py tests/

      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short

  test-bridge-integration:
    name: Bridge integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: homeassistant
          POSTGRES_DB: agent_memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@c8813ba1bc76ebf779b911ad8ffccbf2e449cb48
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Apply schema migrations
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: homeassistant
          PGDATABASE: agent_memory
        run: |
          psql -f agent_memory_ledger/rootfs/usr/share/agent_memory_ledger/agent_memory/000_schema_migrations.sql
          for f in agent_memory_ledger/rootfs/usr/share/agent_memory_ledger/agent_memory/[0-9][0-9][0-9]_*.sql; do
            [[ "$(basename "$f")" == "000_schema_migrations.sql" ]] && continue
            psql -f "$f"
          done

      - name: Run integration tests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: agent_memory
          DB_USER: postgres
          DB_PASSWORD: homeassistant
        run: python -m pytest tests/ -v --tb=short -m integration || echo "No integration tests yet — stage ready for future tests"

  validate-bridge-schema:
    name: Validate bridge SQL schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: homeassistant
          POSTGRES_DB: agent_memory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Apply and validate schema migrations
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGPASSWORD: homeassistant
          PGDATABASE: agent_memory
        run: |
          echo "Applying 000_schema_migrations.sql..."
          psql -f agent_memory_ledger/rootfs/usr/share/agent_memory_ledger/agent_memory/000_schema_migrations.sql

          echo "Applying numbered migrations..."
          for f in agent_memory_ledger/rootfs/usr/share/agent_memory_ledger/agent_memory/[0-9][0-9][0-9]_*.sql; do
            [[ "$(basename "$f")" == "000_schema_migrations.sql" ]] && continue
            echo "  Applying $(basename "$f")..."
            psql -f "$f" || { echo "FAILED: $(basename "$f")"; exit 1; }
          done

          echo "Validating schema structure..."
          psql -c "SELECT count(*) FROM information_schema.schemata WHERE schema_name IN ('event_log','governance','memory','embeddings','kg','audit','agent_memory')"
          psql -c "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'event_log' AND table_name IN ('agent_events','inbox_events','outbox_events','delivery_attempts')"
          psql -c "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'governance' AND table_name IN ('identities','identity_events','action_requests','action_decisions')"
          psql -c "SELECT count(*) FROM information_schema.tables WHERE table_schema = 'memory' AND table_name = 'items'"

          echo "Schema validation passed."

  build:
    name: Build ${{ matrix.architecture }}
    needs:
      - information
      - lint-app
      - lint-hadolint
      - lint-json
      - lint-prettier
      - lint-shellcheck
      - lint-yamllint
      - lint-zizmor
      - lint-dockerfile-deps
      - test-bridge
      - test-bridge-integration
      - validate-bridge-schema
    runs-on: ${{ matrix.architecture == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      matrix:
        architecture: ${{ fromJson(needs.information.outputs.architectures) }}
    steps:
      - name: Check out code from GitHub
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose build flags
        id: flags
        env:
          ARCHITECTURE: ${{ matrix.architecture }}
          BUILD_FILE: ${{ needs.information.outputs.build }}
        run: |
          echo "date=$(date +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          from=$(yq --no-colors eval ".build_from.${ARCHITECTURE}" "${BUILD_FILE}")
          echo "from=${from}" >> "$GITHUB_OUTPUT"

          if [[ "${ARCHITECTURE}" = "amd64" ]]; then
            echo "platform=linux/amd64" >> "$GITHUB_OUTPUT"
          elif [[ "${ARCHITECTURE}" = "aarch64" ]]; then
            echo "platform=linux/arm64/v8" >> "$GITHUB_OUTPUT"
          else
            echo "::error ::Could not determine platform for architecture ${ARCHITECTURE}"
            exit 1
          fi

      - name: Build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          push: false
          # zizmor: ignore[template-injection] - path input to action, not shell-executed
          context: ${{ needs.information.outputs.target }}
          file: ${{ needs.information.outputs.target }}/Dockerfile
          cache-from: |
            type=gha,scope=${{ matrix.architecture }}
          cache-to: type=gha,mode=max,scope=${{ matrix.architecture }}
          platforms: ${{ steps.flags.outputs.platform }}
          build-args: |
            BUILD_ARCH=${{ matrix.architecture }}
            BUILD_DATE=${{ steps.flags.outputs.date }}
            BUILD_DESCRIPTION=${{ needs.information.outputs.description }}
            BUILD_FROM=${{ steps.flags.outputs.from }}
            BUILD_NAME=${{ needs.information.outputs.name }}
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=edge

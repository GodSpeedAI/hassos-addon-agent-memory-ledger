---
name: Dependencies

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - "agent_memory_ledger/docker-dependencies/**"
      - "agent_memory_ledger/pgagent.patch"
      - ".github/workflows/dependencies.yaml"
  workflow_dispatch:
    inputs:
      component:
        description: Dependency image to publish
        required: true
        default: ruvector-pg17
        type: choice
        options:
          - ruvector-pg17
          - all

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: timescaledb-tools
            version: latest
          - component: pgagent-pg16
            version: pgagent-4.2.3
          - component: pgagent-pg17
            version: pgagent-4.2.3
          - component: postgis-pg16
            version: 3.6.3
          - component: postgis-pg17
            version: 3.6.3
          - component: timescaledb-toolkit-pg16
            version: 1.22.0
          - component: timescaledb-toolkit-pg17
            version: 1.22.0
          - component: postgresql-extension-system-stat-pg16
            version: "4.1"
          - component: postgresql-extension-system-stat-pg17
            version: "4.1"
          - component: ruvector-pg17
            version: 2.0.5

    steps:
      - name: Check out repository
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.component == 'all' ||
          inputs.component == matrix.component
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.component == 'all' ||
          inputs.component == matrix.component
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.component == 'all' ||
          inputs.component == matrix.component
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.component == 'all' ||
          inputs.component == matrix.component
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish dependency image
        if: >-
          github.event_name != 'workflow_dispatch' ||
          inputs.component == 'all' ||
          inputs.component == matrix.component
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./agent_memory_ledger/docker-dependencies/${{ matrix.component }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ matrix.version }}
          cache-from: |
            type=registry,ref=ghcr.io/godspeedai/agent-memory-ledger/dependency/${{ matrix.component }}:cache
          cache-to: |
            type=registry,ref=ghcr.io/godspeedai/agent-memory-ledger/dependency/${{ matrix.component }}:cache,mode=max
          tags: |
            ghcr.io/godspeedai/agent-memory-ledger/dependency/${{ matrix.component }}:${{ matrix.version }}

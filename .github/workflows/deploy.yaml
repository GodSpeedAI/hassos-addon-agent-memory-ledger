---
name: Deploy

# yamllint disable-line rule:truthy
on:
  release:
    types:
      - published
  workflow_run:
    workflows:
      - Dependencies
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.arch }} image
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/hassio-addons/base/amd64:20.1.1
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/hassio-addons/base/aarch64:20.1.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read add-on version
        id: addon
        shell: bash
        run: |
          version="$(awk '/^version:/ { print $2; exit }' agent_memory_ledger/config.yaml)"
          if [[ -z "${version}" ]]; then
            echo "Unable to read add-on version from agent_memory_ledger/config.yaml" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ./agent_memory_ledger
          file: ./agent_memory_ledger/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_DATE=${{ steps.addon.outputs.created }}
            BUILD_REF=${{ github.sha }}
            BUILD_VERSION=${{ steps.addon.outputs.version }}
            BUILD_REPOSITORY=${{ github.repository }}
          tags: |
            ghcr.io/godspeedai/agent-memory-ledger/${{ matrix.arch }}:${{ steps.addon.outputs.version }}

      - name: Verify anonymous image pull
        shell: bash
        run: |
          image="ghcr.io/godspeedai/agent-memory-ledger/${{ matrix.arch }}:${{ steps.addon.outputs.version }}"
          docker logout ghcr.io || true
          if ! docker manifest inspect "${image}" >/dev/null; then
            printf '%s\n' \
              "Published image is not anonymously pullable: ${image}" \
              "" \
              "Home Assistant installs this add-on by pulling the image from GHCR." \
              "Make the package public in the GodSpeedAI organization package" \
              "settings, then rerun this workflow." >&2
            exit 1
          fi
